<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résumé — Mandy Cheng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f0ebe0;
    --black: #1a1814;
    --gray: #7a7469;
    --border: #e4e0d8;
    --serif: 'Bodoni Moda', 'Didot', Georgia, serif;
    --sans: 'Jost', 'Futura', sans-serif;
    --nav-h: 72px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #fff;
    color: var(--black);
    font-family: var(--sans);
    font-weight: 300;
    display: flex;
    flex-direction: column;
  }
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 56px;
    height: var(--nav-h);
    background: var(--cream);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--black);
    text-decoration: none;
  }
  .actions {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .actions a {
    font-size: 0.56rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gray);
    text-decoration: none;
    transition: color 0.2s;
  }
  .actions a:hover { color: var(--black); }
  .actions .download {
    border: 1px solid var(--border);
    padding: 10px 18px;
    color: var(--black);
  }
  .actions .download:hover {
    border-color: var(--black);
    background: var(--black);
    color: #fff;
  }
  .viewer-wrap {
    flex: 1;
    min-height: 0;
    background: #fafaf8;
  }
  .viewer-wrap iframe,
  .viewer-wrap object {
    width: 100%;
    height: 100%;
    min-height: calc(100vh - var(--nav-h));
    border: 0;
    display: block;
  }
  @media (max-width: 800px) {
    header { padding: 0 24px; }
    .actions { gap: 16px; flex-wrap: wrap; justify-content: flex-end; }
  }
</style>
</head>
<body>
<header>
  <a href="index.html" class="brand">Mandy Cheng</a>
  <nav class="actions">
    <a href="index.html">← Portfolio</a>
    <a href="Mandy_Cheng_Resume.pdf" class="download" download>Download PDF</a>
  </nav>
</header>
<div class="viewer-wrap">
  <iframe src="Mandy_Cheng_Resume.pdf#view=FitH" title="Mandy Cheng résumé PDF"></iframe>
</div>
</body>
</html>
