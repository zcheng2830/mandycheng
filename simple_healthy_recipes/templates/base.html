<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Simple Healthy Recipes{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="theme-base">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('home') }}">
        <span class="brand-mark">Nutri</span>Cook
      </a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item {{ 'active' if request.endpoint == 'home' }}">
            <a class="nav-link" href="{{ url_for('home') }}">Home</a>
          </li>
          <li class="nav-item {{ 'active' if request.endpoint in ['learn', 'flipcards'] }}">
            <a class="nav-link" href="{{ url_for('learn', lesson_id=1) }}">Learn</a>
          </li>
          <li class="nav-item dropdown">
            <a
              class="nav-link dropdown-toggle {{ 'active' if request.endpoint == 'flipcards' }}"
              href="#"
              id="ingMenu"
              data-toggle="dropdown"
              role="button"
              aria-haspopup="true"
              aria-expanded="false"
            >
              Ingredients
            </a>
            <div class="dropdown-menu">
              <a class="dropdown-item" href="{{ url_for('flipcards', lesson_id=2, category='protein') }}">Proteins</a>
              <a class="dropdown-item" href="{{ url_for('flipcards', lesson_id=2, category='vegetable') }}">Vegetables</a>
              <a class="dropdown-item" href="{{ url_for('flipcards', lesson_id=2, category='base') }}">Bases</a>
            </div>
          </li>
          <li class="nav-item {{ 'active' if request.endpoint in ['quiz', 'results'] }}">
            <a class="nav-link" href="{{ url_for('quiz', quiz_id=1) }}">Quiz</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="site-shell">
    <div class="container py-4">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.1/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
