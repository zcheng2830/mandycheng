<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="static/style.css">
</head>
<body class="theme-base">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><span class="brand-mark">Nutri</span>Cook</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="safety.html">Learn</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="ingMenu" data-toggle="dropdown">Ingredients</a>
            <div class="dropdown-menu">
              <a class="dropdown-item" href="protein.html">Proteins</a>
              <a class="dropdown-item" href="vegetable.html">Vegetables</a>
              <a class="dropdown-item" href="base.html">Bases</a>
            </div>
          </li>
          <li class="nav-item active"><a class="nav-link" href="quiz.html">Quiz</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="site-shell">
    <div class="container py-4">
      <section class="results-shell surface-card text-center" data-reveal>
        <p class="eyebrow">Quiz Complete</p>
        <h1 id="resultsTitle">Your Results</h1>

        <div class="result-score">
          <span id="scoreValue">0</span>/<span id="totalValue">10</span>
        </div>

        <p class="lead mt-3" id="resultsMessage">Great start. Revisit the lessons and try again.</p>

        <div class="hero-actions justify-content-center mt-4">
          <a href="index.html" class="btn btn-primary btn-lg">Back to Home</a>
          <a href="safety.html" class="btn btn-outline-secondary btn-lg">Review Lessons</a>
        </div>
      </section>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.1/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="static/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var score = parseInt(localStorage.getItem('quizScore') || '0', 10);
      var total = parseInt(localStorage.getItem('quizTotal') || '10', 10);

      document.getElementById('scoreValue').textContent = score;
      document.getElementById('totalValue').textContent = total;

      if (score === total) {
        document.getElementById('resultsTitle').textContent = 'Perfect Score';
        document.getElementById('resultsMessage').textContent = 'Outstanding. You are ready to cook with confidence.';
      } else if (score / total >= 0.7) {
        document.getElementById('resultsMessage').textContent = 'Strong result. Review once more to lock in mastery.';
      } else {
        document.getElementById('resultsMessage').textContent = 'Great start. Revisit the lessons and try again.';
      }

      localStorage.removeItem('quizScore');
      localStorage.removeItem('quizTotal');
    });
  </script>
</body>
</html>
